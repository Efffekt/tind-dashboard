<!DOCTYPE html>
<!--
  ─────────────────────────────────────────────────────────────────────────
  login.html — PIN-innlogging for dashbordet
  ─────────────────────────────────────────────────────────────────────────

  Frittstående side som vises av middleware når ingen gyldig sesjons-cookie
  finnes. Enkel numerisk PIN-innskriving; poster til /api/auth og leder
  tilbake til / ved suksess. Stilt for å matche resten av dashbordet, men
  med inline CSS slik at den ikke er avhengig av styles.css.
-->
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn | Tind Logistics</title>
  <meta name="theme-color" content="#F5F5F3" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F5F5F3;
      --white: #ffffff;
      --text: #3C3C3C;
      --muted: #666;
      --heading: #1C1C1C;
      --border: #EAEAEA;
      --border-strong: #1C1C1C;
      --error: #C4442E;
      --sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      --display: "Clash Display", ui-sans-serif, system-ui, sans-serif;
      --logo: "Bebas Neue", "Clash Display", ui-sans-serif, system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans); font-weight: 420; color: var(--text);
      background: var(--bg); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    .page-frame {
      pointer-events: none; position: fixed; inset: 0; z-index: 1;
      max-width: 1920px; margin: 0 auto; padding: 0 4rem;
    }
    .page-frame > div { height: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

    .topbar {
      padding: 32px 4rem; display: flex; align-items: center; gap: 14px;
      font-family: var(--logo); font-size: 1.7rem; font-weight: 400;
      color: var(--heading); letter-spacing: 0.05em;
      text-transform: uppercase;
      position: relative; z-index: 2;
    }
    .topbar img { height: 30px; width: auto; }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px 4rem 64px; position: relative; z-index: 2;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 64px 72px;
      max-width: 480px; width: 100%;
      text-align: center;
    }
    .tag {
      font-family: var(--display); font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 24px;
    }
    h1 {
      font-family: var(--display); font-weight: 600; letter-spacing: -0.03em;
      color: var(--heading); font-size: 2.4rem; line-height: 1.1; margin-bottom: 12px;
    }
    .sub { color: var(--muted); font-size: 1rem; margin-bottom: 40px; }

    .pin-field {
      width: 100%;
      font-family: var(--display); font-variant-numeric: tabular-nums;
      letter-spacing: 0.6em;
      font-size: 2.2rem; font-weight: 500;
      color: var(--heading);
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-strong);
      padding: 18px 0 14px;
      outline: none;
      -moz-appearance: textfield;
    }
    .pin-field::-webkit-outer-spin-button,
    .pin-field::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .pin-field:focus { border-bottom-color: var(--heading); }

    .submit {
      margin-top: 32px;
      width: 100%;
      font-family: var(--sans); font-weight: 500; font-size: 0.95rem;
      letter-spacing: 0.02em;
      background: var(--heading); color: var(--white);
      border: none; padding: 18px 24px; cursor: pointer;
      transition: background 120ms ease;
    }
    .submit:hover { background: #000; }
    .submit:disabled { background: #888; cursor: not-allowed; }

    .error {
      margin-top: 20px; min-height: 1.2em;
      color: var(--error); font-size: 0.9rem; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="page-frame" aria-hidden="true"><div></div></div>

  <div class="topbar">
    <img src="/logos/tind-mark.svg" alt="" width="24" height="31" />
    Tind Logistics
  </div>

  <main>
    <form class="card" id="login-form" autocomplete="off">
      <p class="tag">Tilgang</p>
      <h1>Skriv inn PIN</h1>
      <p class="sub">Dashbordet er passordbeskyttet.</p>

      <!-- inputmode="numeric" gir tallpad på touch-skjermer uten å tvinge type=number.
           autofocus sørger for at man kan begynne å taste med én gang siden TV-fjernkontroll/tastatur er vanlig input. -->
      <input
        id="pin"
        class="pin-field"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="12"
        autocomplete="one-time-code"
        autofocus
        required
        aria-label="PIN"
      />

      <button type="submit" class="submit" id="submit-btn">Logg inn</button>
      <div class="error" id="error-msg" role="alert"></div>
    </form>
  </main>

  <script>
    // Post PIN-en til /api/auth. Ved 200 OK leder vi tilbake til / (eller til
    // ?next=-parameter hvis middleware la den på URL-en før redirect).
    const form = document.getElementById('login-form');
    const pinInput = document.getElementById('pin');
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');

    // Hent redirect-mål fra ?next= hvis satt; default er "/".
    function nextUrl() {
      const p = new URLSearchParams(location.search);
      const n = p.get('next');
      // Tillat kun relative stier (beskytter mot open redirect).
      if (n && n.startsWith('/') && !n.startsWith('//')) return n;
      return '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const resp = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: pinInput.value }),
        });
        if (resp.ok) {
          location.replace(nextUrl());
          return;
        }
        if (resp.status === 401) {
          err.textContent = 'Feil PIN. Prøv igjen.';
        } else {
          err.textContent = 'Noe gikk galt. Prøv igjen.';
        }
        pinInput.value = '';
        pinInput.focus();
      } catch {
        err.textContent = 'Kunne ikke kontakte serveren.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
